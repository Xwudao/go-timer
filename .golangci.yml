version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - noctx
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: github.com/Xwudao/go-timer
  revive:
    rules:
      - name: exported
        severity: warning
  gosec:
    excludes:
      - G204 # Subprocess launched with variable (intentional — we wrap systemctl)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
